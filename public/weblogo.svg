      <stop offset="0%" style="stop-color:#00F5FF"/>
      <stop offset="100%" style="stop-color:#00B8D9"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#gradient)"/>
  
  <!-- ECG/Pulse line (original path) -->
