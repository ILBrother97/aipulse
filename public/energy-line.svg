<svg width="400" height="2" viewBox="0 0 400 2" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the flowing line -->
    <linearGradient id="energyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#00FFFF;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#00FFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base subtle line -->
  <rect width="400" height="2" fill="var(--color-border)" opacity="0.3"/>
  
  <!-- Flowing energy wave -->
  <g filter="url(#glow)">
    <rect class="energy-flow" x="0" y="0" width="200" height="2" fill="url(#energyGradient)"/>
  </g>
  
  <!-- Animated CSS -->
  <style>
    .energy-flow {
      animation: energyFlow 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    
    @keyframes energyFlow {
      0% {
        transform: translateX(-200px);
        opacity: 0;
      }
      10% {
        opacity: 0.5;
      }
      50% {
        opacity: 1;
      }
      90% {
        opacity: 0.5;
      }
      100% {
        transform: translateX(400px);
        opacity: 0;
      }
    }
  </style>
</svg>
