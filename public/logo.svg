<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- 3D Gradient -->
    <linearGradient id="gradient3D" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F5FF;stop-opacity:1">
        <animate attributeName="stop-color" values="#00F5FF;#00B8D9;#00F5FF" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00B8D9;stop-opacity:1">
        <animate attributeName="stop-color" values="#00B8D9;#00F5FF;#00B8D9" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Inner shadow for 3D depth -->
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="-1" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Clip path for 3D effect -->
    <clipPath id="roundedClip">
      <rect x="5" y="5" width="90" height="90" rx="18" ry="18"/>
    </clipPath>
  </defs>
  
  <!-- Animated background with pulse -->
  <g>
    <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#gradient3D)" filter="url(#glow)">
      <animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="2s" repeatCount="indefinite" additive="sum"/>
    </rect>
    
    <!-- Secondary layer for 3D depth -->
    <rect x="7" y="7" width="86" height="86" rx="18" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3">
      <animateTransform attributeName="transform" type="scale" values="1;0.98;1" dur="2s" begin="0.1s" repeatCount="indefinite" additive="sum"/>
    </rect>
  </g>
  
  <!-- ECG/Circuit pattern with 3D perspective -->
  <g clip-path="url(#roundedClip)" filter="url(#innerShadow)">
    <!-- Main ECG line with animation -->
    <path d="M 20 50 
             L 32 50 
             L 38 42 
             L 44 58 
             L 50 38 
             L 56 62 
             L 62 35 
             L 68 55 
             L 74 48 
             L 86 48 
             M 74 48 
             L 80 58 
             L 86 58" 
          fill="none" 
          stroke="#0A1428" 
          stroke-width="4" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#glow)">
      <!-- Animate the path drawing -->
      <animate attributeName="stroke-dasharray" values="0,300;150,150;300,0" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Floating particles/nodes -->
    <circle cx="86" cy="48" r="3" fill="#0A1428" filter="url(#glow)">
      <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="86" cy="58" r="3" fill="#0A1428" filter="url(#glow)">
      <animate attributeName="r" values="3;4;3" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Additional accent lines for 3D effect -->
    <g opacity="0.4">
      <line x1="25" y1="45" x2="30" y2="45" stroke="#0A1428" stroke-width="2" stroke-linecap="round">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.8s" repeatCount="indefinite"/>
      </line>
      <line x1="70" y1="52" x2="75" y2="52" stroke="#0A1428" stroke-width="2" stroke-linecap="round">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>
  
  <!-- Rotating ring for extra 3D flair -->
  <g transform="translate(50, 50)">
    <ellipse cx="0" cy="0" rx="42" ry="42" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.2" stroke-dasharray="5,5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="38" ry="38" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15" stroke-dasharray="3,7">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>